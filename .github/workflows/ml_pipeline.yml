name: Motor ML Pipeline Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # We install dependencies here to ensure train.py has what it needs
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Ensure models directory exists
      run: mkdir -p models

    - name: Train and Validate Model
      run: |
        # This will now work because streamlit/altair are compatible
        python src/train.py
        # Check if model file was created
        if [ ! -f models/motor_model.pkl ]; then
          echo "Model file not generated correctly"
          exit 1
        fi

    - name: Upload Trained Model Artifact
      uses: actions/upload-artifact@v4
      with:
        name: motor-maintenance-model
        path: models/motor_model.pkl
        retention-days: 5